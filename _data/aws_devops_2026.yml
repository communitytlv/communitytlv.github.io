  - title: "'The Last Human On-Call' — When AI fixes everything, who still knows anything?"
    track: "Main Stage"
    track_color: "#e74c5e"
    time_start: "2026-06-11T15:00"
    time_end: "2026-06-11T15:10"
    time_display: "3:00 PM – 3:10 PM"
    location: "Main Stage"
    type: "ignite"
    speakers:
      - name: "Miki Manor"
        role: "Director of Infrastructure Engineering, Skai"
        photo: "/assets/images/speakers/miki-manor.png"
    description: "Eliminating toil is one of the SRE community's most sacred goals. AI agents are finally delivering on that promise — handling first-line incident response, running runbooks, auto-remediating known failure modes. Page volume is down. Mean time to resolution is down. On-call burden is down. This is unambiguously good. And it's also hiding a slow-moving crisis. SREs have always learned production systems by living with them — by being paged at 2am, clicking through runbook steps that felt tedious, noticing that this particular service always spikes after a deploy to that downstream dependency. That pattern recognition didn't live in documentation. It lived in the repetition. It lived in the toil. <br/> When AI agents absorb all of that, the humans who remain are faster, less burned out, and increasingly de-calibrated from their own systems. The first time something genuinely novel breaks — outside the agent's training distribution, no runbook applicable — you need a human who deeply knows the system. That human may no longer exist because they haven't been paged in eighteen months. This talk is about the expertise debt accumulating silently in every org embracing agentic operations — and the engineering practices that can help you not wake up to it the hard way."
    video_url: "https://www.youtube.com/watch?v=2Cyd6dgrtTI"


  - title: "Thousands of Clusters Maintained: Lessons Learned and Tales to Tell"
    track: "Main Stage"
    track_color: "#e74c5e"
    time_start: "2026-06-11T15:10"
    time_end: "2026-06-11T15:20"
    time_display: "3:10 PM – 3:20 PM"
    location: "Main Stage"
    type: "ignite"
    speakers:
      - name: "Itamar Syn Hershko"
        role: "CTO & Founder, BigData Boutique"
        photo: "/assets/images/speakers/itamar-syn-hershko.jpg"
    description: "In this talk, we'll dive deep into the heart of OpenSearch and higlight common mistakes but also not so common gotchas that'd help you optimize and stabilize your deployment too. This talk is based on 15 years of cluster maintenance in production - at every vertical, any scale, all use-cases you can think of. From Elasticsearch 0.10 to OpenSearch 3.0, I've seen it all and survived to tell the story."
    video_url: "https://www.youtube.com/watch?v=78SjPN00_RY"


  - title: "SPECIAL HAPPY HOUR SESSION - Promethouse: Transforming Your metrics into house music + 🍻 snacks & drinks"
    track: "FOYER"
    track_color: "#00bfa5"
    time_start: "2026-06-11T15:20"
    time_end: "2026-06-11T16:00"
    time_display: "3:20 PM – 4:00 PM"
    location: "Main Stage"
    type: "talk"
    speakers:
      - name: "Edan Shahmoon"
        role: "Data Scientist and DevOps Engineer"
        photo: "/assets/images/speakers/edan-shahmoon.png"
    description: "Closing talk followed by mingling and networking.<br/><br/>Have you ever wondered what your infrastructure sounds like? In this talk, I'll introduce 'Promethouse,' a lighthearted side project that turns system observability into house music. We'll start by diving under the hood of the Prometheus pull-based scraping protocol to understand how it ingests massive amounts of time-series data. But instead of building another Grafana dashboard, we'll route that data to the dancefloor. I will walk through the core engineering challenge: applying dimensionality reduction algorithms to distill thousands of chaotic, high-dimensional service metrics into a unified 'tempo' for each microservice. By the end of this session, you'll see (and hear!) how mathematical transformations can turn the noise of CPU spikes and memory leaks into a surprisingly groovy, cohesive musical track."