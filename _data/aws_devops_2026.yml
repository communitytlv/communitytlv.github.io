  #Tracks 6

  - title: "AI-Driven DevOps: From Operational Overload to Continuous Optimization (Cost, Security, Reliability)"
    track: "Track 1 - AWS Experience"
    track_color: "#f5a623"
    time_start: "2026-06-11T14:25"
    time_end: "2026-06-11T14:50"
    time_display: "2:25 PM – 2:50 PM"
    location: "Track 1 – AWS Experience"
    type: "talk"
    speakers:
      - name: "Asia Salner"
        role: "Director of DevOps, Coro"
        photo: "/assets/images/speakers/placeholder.jpg"
    description: "We operate a multi-account AWS environment (12 accounts, 4 regions) on EKS, Terraform, GitLab CI, and ArgoCD. The primary constraint was not infrastructure scale, but operational overload: growing backlog, missed cost optimizations, delayed risk detection, and constant reactive work.<br/><br/> This session presents how AI is embedded into both DevOps workflows and the platform layer to shift from reactive operations to continuous optimization,<br/>--Cost & hygiene — continuous scanning across AWS accounts to detect unused resources, redundant services, orphaned assets, and cost inefficiencies, with fixes generated as code<br/>--Security & compliance — identifying over-permissioned access, configuration drift, and policy violations, with controlled remediation via pipelines<br/>--Production signal analysis — logs, metrics, and code analyzed to surface hidden issues such as memory leaks and abnormal patterns missed during development<br/>--Shift-left review — AI-assisted code review for Terraform, Kubernetes, and CI/CD to prevent misconfigurations before deployment<br/>--Autonomous task execution — DevOps tasks from Jira translated into reviewed, GitOps-driven changes<br/>--Impact-based prioritization — operational work ranked by cost, reliability, and security impact, reducing backlog and eliminating low-value manual triage<br/><br/> All actions are enforced through GitOps and review. No direct production mutations.<br/><br/> Focus: architecture, integration patterns, control mechanisms, and measurable impact on cost, MTTR, and operational load."
  
  - title: "Why Your Kubernetes Cluster Will Fail: Lessons from 1 Million Real-World Incidents"
    track: "Track 2 - TLVCommunity"
    track_color: "#e91e90"
    time_start: "2026-06-11T14:25"
    time_end: "2026-06-11T14:50"
    time_display: "2:25 PM – 2:50 PM"
    location: "Track 2 – TLVCommunity"
    type: "talk"
    speakers:
      - name: "Asaf Savich"
        role: "AI Engineering Group Manager, Komodor"
        photo: "/assets/images/speakers/asaf-savich.png"
    description: We've analyzed over 1 million production K8s failures across thousands of clusters. The data reveals something striking - the vast majority of incidents fall into predictable, preventable categories. By the law of large numbers, if we address these recurring issues, we can drastically improve production reliability. <br/><br/>This talk presents the most common K8s failure patterns backed by real data at scale. We'll cover 6 major categories - Resource Exhaustion (OOMKilled pods, memory leaks, GPU thermal throttling), Image & Deployment Issues (ImagePullBackOff, stuck rollouts), Config & Secret Management (rotation breaking apps, ConfigMap drift), Cascading Failures (missing ConfigMaps triggering multi-pod failures, dependency chains), Storage & Persistence (PVC conflicts, CSI driver issues), & App vs Infra Debugging (CrashLoopBackOff mysteries, GPU XID errors).<br/><br/>For each category, we'll show real K8s events, explain why these failures are so common, and provide actionable prevention strategies."

