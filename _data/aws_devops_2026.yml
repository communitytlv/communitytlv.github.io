  - title: "RAG on Your Data Lake"
    track: "Track 2 - TLVCommunity"
    track_color: "#e91e90"
    time_start: "2026-06-11T12:25"
    time_end: "2026-06-11T12:50"
    time_display: "12:25 PM – 12:50 PM"
    location: "Track 2 – TLVCommunity"
    type: "talk"
    speakers:
      - name: "Haggai Zohar"
        role: "Data Tech Lead, TeraSky"
        photo: "/assets/images/speakers/haggai-zohar.png"
    description: "Most data lakes aren’t LLM-ready. Without structure, metadata, and governance, connecting generative AI to S3 data creates risk, cost, and unreliable results. This session walks through an end-to-end Retrieval-Augmented Generation (RAG) architecture on AWS. We’ll cover ingestion and preprocessing of structured and unstructured data from Amazon S3, building embeddings with Amazon Bedrock or SageMaker, and choosing vector storage with OpenSearch or Aurora pgvector. You’ll see how retrieval orchestration and inference run securely with Bedrock, alongside IAM, PII, and governance controls. We’ll also examine cost, latency, freshness trade-offs—and when RAG beats fine-tuning or search-only approaches."

