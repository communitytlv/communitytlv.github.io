  - title: "'The Last Human On-Call' — When AI fixes everything, who still knows anything?"
    track: "Main Stage"
    track_color: "#e74c5e"
    time_start: "2026-06-11T15:00"
    time_end: "2026-06-11T15:10"
    time_display: "3:00 PM – 3:10 PM"
    location: "Main Stage"
    type: "ignite"
    speakers:
      - name: "Miki Manor"
        role: "Director of Infrastructure Engineering, Skai.ai"
        photo: "/assets/images/speakers/miki-manor.png"
    description: "Eliminating toil is one of the SRE community's most sacred goals. AI agents are finally delivering on that promise — handling first-line incident response, running runbooks, auto-remediating known failure modes. Page volume is down. Mean time to resolution is down. On-call burden is down. This is unambiguously good. And it's also hiding a slow-moving crisis. SREs have always learned production systems by living with them — by being paged at 2am, clicking through runbook steps that felt tedious, noticing that this particular service always spikes after a deploy to that downstream dependency. That pattern recognition didn't live in documentation. It lived in the repetition. It lived in the toil. <br/> When AI agents absorb all of that, the humans who remain are faster, less burned out, and increasingly de-calibrated from their own systems. The first time something genuinely novel breaks — outside the agent's training distribution, no runbook applicable — you need a human who deeply knows the system. That human may no longer exist because they haven't been paged in eighteen months. This talk is about the expertise debt accumulating silently in every org embracing agentic operations — and the engineering practices that can help you not wake up to it the hard way."

  - title: "Thousands of Clusters Maintained: Lessons Learned and Tales to Tell"
    track: "Main Stage"
