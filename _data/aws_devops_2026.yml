  - title: "From Black Box to Glass Box: Observability for LLMs"
    track: "Track 1 - AWS Experience"
    track_color: "#f5a623"
    time_start: "2026-06-11T12:00"
    time_end: "2026-06-11T12:25"
    time_display: "12:00 PM – 12:25 PM"
    location: "Track 1 – AWS Experience"
    type: "talk"
    speakers:
      - name: "Aviv Zohari"
        role: "Field CTO, groundcover"
        photo: "/assets/images/speakers/aviv-zohari.png"
    description: "In just a few years, LLMs have gone from research curiosities to the backbone of new software experiences. Organizations are rapidly productionizing LLM workflows because of their immense value, but often without observability guardrails. This introduces new layers of fragility and complexity: performance volatility, quality drift, and security risks. In this talk, we explore how to monitor and troubleshoot LLM applications with zero instrumentation. Whether on commercial LLM stacks or AWS Bedrock, we’ll break open the LLM black box and learn how to track token usage, response latency, data exposure risks, and model execution failures."

  - title: "The Agentic Era: Microservices, Reimagined?"
    track: "Track 2 - TLVCommunity"
    track_color: "#e91e90"
    time_start: "2026-06-11T12:00"
    time_end: "2026-06-11T12:25"
    time_display: "12:00 PM – 12:25 PM"
    location: "Track 2 – TLVCommunity"
    type: "talk"
    speakers:
      - name: "Issac Goldstand"
        role: "Field CTO, CloudEx"
        photo: "/assets/images/speakers/issac-goldstand.png"
    description: "As we enter the 'Agentic Era' of software engineering, we are replacing deterministic programming languages with natural language and replacing traditional flow control with non-deterministic LLMs. But are we throwing away a decade of architectural best practices? While the talk will focus on high-level architecture principles, we will briefly dip into code written using the AWS Strands SDK to understand the basics of writing AI Agents that can run on AWS Bedrock. We'll also understand how this relates to writing code with Agentic AI IDEs, such as AWS Kiro or VS Code."


