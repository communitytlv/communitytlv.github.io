  - title: "Why Your Kubernetes Cluster Will Fail: Lessons from 1 Million Real-World Incidents"
    track: "Track 2 - TLVCommunity"
    track_color: "#e91e90"
    time_start: "2026-06-11T14:25"
    time_end: "2026-06-11T14:50"
    time_display: "2:25 PM – 2:50 PM"
    location: "Track 2 – TLVCommunity"
    type: "talk"
    speakers:
      - name: "Asaf Savich"
        role: "AI Engineering Group Manager, Komodor"
        photo: "/assets/images/speakers/asaf-savich.png"
    description: We've analyzed over 1 million production K8s failures across thousands of clusters. The data reveals something striking: the vast majority of incidents fall into predictable, preventable categories. By the law of large numbers, if we address these recurring issues, we can drastically improve production reliability. <br/> This talk presents the most common K8s failure patterns backed by real data at scale. We'll cover 6 major categories: Resource Exhaustion (OOMKilled pods, memory leaks, GPU thermal throttling), Image & Deployment Issues (ImagePullBackOff, stuck rollouts), Config & Secret Management (rotation breaking apps, ConfigMap drift), Cascading Failures (missing ConfigMaps triggering multi-pod failures, dependency chains), Storage & Persistence (PVC conflicts, CSI driver issues), & App vs Infra Debugging (CrashLoopBackOff mysteries, GPU XID errors).<br/>For each category, we'll show real K8s events, explain why these failures are so common, and provide actionable prevention strategies."

