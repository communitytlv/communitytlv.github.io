  #Tracks 3

  - title: "From Black Box to Glass Box: Observability for LLMs"
    track: "Track 1 - AWS Experience"
    track_color: "#f5a623"
    time_start: "2026-06-11T12:00"
    time_end: "2026-06-11T12:25"
    time_display: "12:00 PM – 12:25 PM"
    location: "Track 1 – AWS Experience"
    type: "talk"
    speakers:
      - name: "Aviv Zohari"
        role: "Field CTO, groundcover"
        photo: "/assets/images/speakers/aviv-zohari.png"
    description: "In just a few years, LLMs have gone from research curiosities to the backbone of new software experiences. Organizations are rapidly productionizing LLM workflows because of their immense value, but often without observability guardrails. This introduces new layers of fragility and complexity: performance volatility, quality drift, and security risks. In this talk, we explore how to monitor and troubleshoot LLM applications with zero instrumentation. Whether on commercial LLM stacks or AWS Bedrock, we’ll break open the LLM black box and learn how to track token usage, response latency, data exposure risks, and model execution failures."

  - title: "The Agentic Era: Microservices, Reimagined?"
    track: "Track 2 - TLVCommunity"
    track_color: "#e91e90"
    time_start: "2026-06-11T12:00"
    time_end: "2026-06-11T12:25"
    time_display: "12:00 PM – 12:25 PM"
    location: "Track 2 – TLVCommunity"
    type: "talk"
    speakers:
      - name: "Issac Goldstand"
        role: "Field CTO, CloudEx"
        photo: "/assets/images/speakers/issac-goldstand.png"
    description: "As we enter the 'Agentic Era' of software engineering, we are replacing deterministic programming languages with natural language and replacing traditional flow control with non-deterministic LLMs. But are we throwing away a decade of architectural best practices? While the talk will focus on high-level architecture principles, we will briefly dip into code written using the AWS Strands SDK to understand the basics of writing AI Agents that can run on AWS Bedrock. We'll also understand how this relates to writing code with Agentic AI IDEs, such as AWS Kiro or VS Code."

#Tracks 4

  - title: "Running 100M prompts on EC2 under GPU capacity constraints"
    track: "Track 1 - AWS Experience"
    track_color: "#f5a623"
    time_start: "2026-06-11T12:25"
    time_end: "2026-06-11T12:50"
    time_display: "12:25 PM – 12:50 PM"
    location: "Track 1 – AWS Experience"
    type: "talk"
    speakers:
      - name: "Boaz Touito"
        role: "CTO, Impala AI"
        photo: "/assets/images/speakers/boaz-touito.jpeg"
    description: "This session is a technical customer story about running a 100M-image multimodal inference workload on Amazon EKS with vLLM under real GPU capacity constraints. It starts with a straightforward capacity plan based on B200 machines and a GPU-hour calculation, then shows why that plan breaks down in practice when ideal capacity is not consistently available. From there, the talk explains how the hardware strategy expands across multiple AWS GPU families, why NVFP4 changes the economics, and why vLLM serving strategy has to be adapted to the topology of each machine type. The session closes with the final architecture and an additional slide on how Impala productizes this approach for production workloads."

  - title: "RAG on Your Data Lake"
    track: "Track 2 - TLVCommunity"
    track_color: "#e91e90"
    time_start: "2026-06-11T12:25"
    time_end: "2026-06-11T12:50"
    time_display: "12:25 PM – 12:50 PM"
    location: "Track 2 – TLVCommunity"
    type: "talk"
    speakers:
      - name: "Haggai Zohar"
        role: "Data Tech Lead, TeraSky"
        photo: "/assets/images/speakers/haggai-zohar.jpg"
    description: "Most data lakes aren’t LLM-ready. Without structure, metadata, and governance, connecting generative AI to S3 data creates risk, cost, and unreliable results. This session walks through an end-to-end Retrieval-Augmented Generation (RAG) architecture on AWS. We’ll cover ingestion and preprocessing of structured and unstructured data from Amazon S3, building embeddings with Amazon Bedrock or SageMaker, and choosing vector storage with OpenSearch or Aurora pgvector. You’ll see how retrieval orchestration and inference run securely with Bedrock, alongside IAM, PII, and governance controls. We’ll also examine cost, latency, freshness trade-offs—and when RAG beats fine-tuning or search-only approaches."

