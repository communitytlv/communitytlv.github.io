  - title: "Your Agent Built It. Who the 🤬 Runs It?"
    track: "Main Stage"
    track_color: "#e74c5e"
    time_start: "2026-06-11T10:00"
    time_end: "2026-06-11T10:30"
    time_display: "10:00 AM – 10:30 AM"
    location: "Main Stage"
    type: "keynote"
    speakers:
      - name: "Ran Tavory"
        role: "Keynote Speaker"
        photo: "/assets/images/speakers/ran-tavory.avif"
    description: "Coding agents are shipping production code faster than you can read it. Somebody still has to run it at 2 AM. This talk is for the people on that pager - three forces making production harder, and the concrete shifts (observability, SLOs, policy-as-code, AI investigation reports) that define the next decade of the SRE role."
    video_url: "https://www.youtube.com/watch?v=q2U5SV9QMgM"


  - title: "Sponsor Ignites"
    track: "Main Stage"
    track_color: "#e74c5e"
    time_start: "2026-06-11T10:30"
    time_end: "2026-06-11T10:45"
    time_display: "10:30 AM – 10:45 AM"
    location: "Main Stage"
    type: "ignite"
    speakers:
      - name: "Anton Weiss"
        role: "Developer Advocate, DoIT"
        photo: "/assets/images/sponsor-logos/doit-SQ.png"
      - name: "Or Plavnik & Michael Isayev"
        role: "Innocom"
        photo: "/assets/images/sponsor-logos/innocom-SQ.png"
      - name: "Danny Parizada"
        role: "Solution Engineer, Grafana Labs"
        photo: "/assets/images/sponsor-logos/grafana-SQ.png"
    description: "<em><strong>Innocom: MTTR Vertigo: The Power of Consolidation.</strong></em><br/><br/>2 AM. Service down. You're flipping between seven tools trying to figure out where to start -that's MTTR vertigo. This talk shows how consolidating your entire stack onto one platform removes the silos that turn 5-minute investigations into hour-long ones. You'll see what root cause analysis looks like when metrics, logs, traces, and ownership all live in one database, queryable in one language. Walk in skeptical. Leave with a clear answer to why silos cost more than every observability license combined.<br/><br/><em><strong>DoIT: Leaner K8s with PSI metrics</strong></em><br/><br/>PSI metrics have graduated to beta in K8s v1.34. It may be a small feature but it can matter a lot for your application performance and efficiency. Let's understand how they can make your clusters and autoscaling leaner.<br/><br/><em><strong>Grafana: AI Makes Observability Conversational. Grafana Makes It Correct.</strong></em><br/><br/>Everyone is exposing an MCP server onto their observability stack. That's the easy part. Wiring an LLM to your metrics, logs, and traces takes an afternoon. The hard part is making the answers true, so that when you ask \"why is service slow at 3am,\" you get a real root cause instead of a confident hallucination built on whatever the model happened to retrieve. This talk is about what separates a demo from something you'd trust during an incident: a deterministic foundation underneath the AI. Grafana pairs generative AI with a Knowledge Graph that holds ground truth, the real relationships between your services, pods, traces, logs, and the teams that own them. The AI doesn't guess at your topology. It reasons over a verified map of it. Same idea on the data layer: open standards, real telemetry, no black box.<br/><br/><em>Danny Parizada, Solution Engineer, Grafana Labs</em>"
    video_url: "https://www.youtube.com/watch?v=iphtxrMAprw"


  - title: "What's happening to Open Source?"
    track: "Main Stage"
    track_color: "#e74c5e"
    time_start: "2026-06-11T10:45"
    time_end: "2026-06-11T11:05"
    time_display: "10:45 AM – 11:05 AM"
    location: "Main Stage"
    type: "talk"
    speakers:
      - name: "Itay Shakury"
        role: "OSS Maintainer, Engineering Leader"
        photo: "/assets/images/speakers/itay-shakury.jpg"
    description: "Open Source has always been a delicate ecosystem, a rare coexistence of interests, passion and opportunity. That delicate balance is being tested now, and the first signs are starting to show. You might have felt it, I know I have, a gradual change in my own experience as user and maintainer. Small things that only when combined reveal a larger pattern. I can now see four clear trends that I believe are happening right now, and are fundamentally changing the open source landscape. In this talk, I will share my observations and insights about what and how the open source experience is changing, and also why it's happening now (spoiler alert: AI). You will learn to navigate the new open source landscape, the new practices and culture that is emerging, the tools and policies that are in use, and the way it affects you, as an open source user, contributor, or maintainer."
    video_url: "https://www.youtube.com/watch?v=DzvG41MpzMA"


