#Tracks 5

  - title: "Raising the Signal: Improving SNR with Automated Root Cause Analysis on AWS"
    track: "Track 1 - AWS Experience"
    track_color: "#f5a623"
    time_start: "2026-06-11T14:00"
    time_end: "2026-06-11T14:25"
    time_display: "2:00 PM – 2:25 PM"
    location: "Track 1 – AWS Experience"
    type: "talk"
    speakers:
      - name: "Asaf Peleg"
        role: "CATO Networks"
        photo: "/assets/images/speakers/placeholder.jpg"
      - name: "Tomer Doitshman"
        role: "CATO Networks"
        photo: "/assets/images/speakers/placeholder.jpg"
    description: "SOC & NOC teams aren't short on data - they're short on signal. With overwhelming alerts & logs, the challenge is improving Signal-to-Noise Ratio (SNR): isolating what truly matters. <br/><br/> This session presents an automated RCA framework running on Amazon EKS that amplifies signal from network and security incidents. By combining trend detection with GenAI on Amazon Bedrock, the framework transforms complex network and security data into clear, actionable explanations of why incidents occur—and what is likely to happen next.<br/><br/> Our customizable, tool-driven architecture builds tailored RCA workflows per story type, increasing SNR precision. Amazon Bedrock AgentCore provides secure runtime, contextual memory, observability, operationalizing high-SNR insights into RCA-driven actions.<br/> Detection creates data. RCA creates signal."
    
