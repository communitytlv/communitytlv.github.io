title: "DevOpsDays TLV"
description: >
  <a href="https://devopsdays.org" target="_blank">DevOpsDays</a> is a worldwide series of technical conferences covering topics of software
  development, IT infrastructure operations, and the intersection between them.
  DevOpsDays Tel Aviv is one of the largest DevOpsDays events globally, featuring
  world-class speakers, hands-on workshops, and unparalleled networking opportunities.
  <br/>*Find all of our previous event videos and pics below.*

